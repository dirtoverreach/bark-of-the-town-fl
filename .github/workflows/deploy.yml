name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          BODY='{"ref":"main"}'
          SIG=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" | awk '{print $2}')
          curl -f -X POST "$DEPLOY_URL/deploy" \
            -H "Content-Type: application/json" \
            -H "x-deploy-signature: $SIG" \
            -d "$BODY"
